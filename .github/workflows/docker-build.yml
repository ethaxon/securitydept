name: Docker Build

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker tags and labels
        id: docker_plan
        shell: bash
        run: |
          set -euo pipefail
          image_ref="$(printf '%s' "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          mise exec --command "node scripts/release-cli.ts docker publish --format=github-output --ref=${GITHUB_REF} --sha=${GITHUB_SHA} --revision=${GITHUB_SHA} --image=${image_ref} --source-url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_plan.outputs.tags }}
          labels: ${{ steps.docker_plan.outputs.labels }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64
