name: Tests

on:
    push:
        branches:
            - main
            - master
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup mise
              uses: jdx/mise-action@v4

            - name: Install toolchain
              run: mise install

            - name: Install dependencies
              run: mise exec --command "pnpm install --frozen-lockfile"

            - name: Lint repository
              run: mise exec --command "pnpm lint"

            - name: Build TypeScript SDK packages for repository typecheck
              run: mise exec -C sdks/ts --command "pnpm build"

            - name: Typecheck repository
              run: mise exec --command "pnpm typecheck"

            - name: Lint Rust workspace
              run: mise exec --command "cargo clippy --workspace --all-features"

    rust-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup mise
              uses: jdx/mise-action@v4

            - name: Install toolchain
              run: mise install

            - name: Install dependencies
              run: mise exec --command "pnpm install --frozen-lockfile"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build kube test helper
              run: docker buildx build --load -t
                  securitydept-realip-kube-integration-test-helper:v1 -f
                  packages/realip/tests/fixtures/kube-helper/Dockerfile
                  packages/realip/tests/fixtures/kube-helper

            - name: Test Rust workspace
              run: mise exec --command "cargo test --workspace --all-features"

    ts-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup mise
              uses: jdx/mise-action@v4

            - name: Install toolchain
              run: mise install

            - name: Install dependencies
              run: mise exec --command "pnpm install --frozen-lockfile"

            - name: Test TypeScript SDKs
              run: mise exec -C sdks/ts --command "pnpm test"

            - name: Test web UI
              run: mise exec -C apps/webui --command "pnpm test"

    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup mise
              uses: jdx/mise-action@v4

            - name: Install toolchain
              run: mise install

            - name: Install dependencies
              run: mise exec --command "pnpm install --frozen-lockfile"

            - name: Install Playwright browsers and Linux dependencies
              run: mise exec -C apps/webui --command "pnpm exec playwright install --with-deps
                  webkit chromium firefox"

            - name: Prebuild SecurityDept server for E2E
              run: mise exec --command "cargo build --manifest-path apps/server/Cargo.toml"

            - name: Run web UI end-to-end tests
              run: mise exec -C apps/webui --command "pnpm run e2e"
