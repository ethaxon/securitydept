name: Tests

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "**/*.kdl"
      - "assets/**"
      - "LICENSE"
      - "AGENTS.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.kdl"
      - "assets/**"
      - "LICENSE"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: >-
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job
            }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Lint repository
        run: mise exec --command "pnpm lint"

      - name: Build TypeScript SDK packages for repository typecheck
        run: mise exec -C sdks/ts --command "pnpm build"

      - name: Typecheck repository
        run: mise exec --command "pnpm typecheck"

      - name: Install Rust clippy component
        run: mise exec --command "rustup component add --toolchain nightly clippy"

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests-rust-${{ github.job }}
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Lint Rust workspace
        run: mise exec --command "cargo clippy --workspace --all-features"

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: >-
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job
            }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests-rust-${{ github.job }}
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build kube test helper
        run: >-
          docker buildx build --load -t
          securitydept-realip-kube-integration-test-helper:v1 -f
          packages/realip/tests/fixtures/kube-helper/Dockerfile --cache-from
          type=gha,scope=kube-test-helper --cache-to
          type=gha,mode=max,scope=kube-test-helper
          packages/realip/tests/fixtures/kube-helper

      - name: Test Rust workspace
        run: mise exec --command "cargo test --workspace --all-features"

  ts-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: >-
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job
            }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Test TypeScript SDKs
        run: mise exec -C sdks/ts --command "pnpm test"

      - name: Test web UI
        run: mise exec -C apps/webui --command "pnpm test"

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: >-
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job
            }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests-rust-${{ github.job }}
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Restore Playwright browser cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml',
            'apps/webui/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Install Playwright browsers and Linux dependencies
        run: mise exec -C apps/webui --command "pnpm exec playwright install --with-deps
          webkit chromium firefox"

      - name: Prebuild SecurityDept server for E2E
        run: mise exec --command "cargo build --manifest-path apps/server/Cargo.toml"

      - name: Run web UI end-to-end tests
        run: mise exec -C apps/webui --command "pnpm run e2e"

  npm-publish-dry-run:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint-and-typecheck
      - rust-tests
      - ts-tests
      - e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Build TypeScript SDK packages for npm publish
        run: mise exec -C sdks/ts --command "pnpm build"

      - name: Pack and publish dry-run npm packages
        run: mise exec --command "node scripts/release-cli.ts npm publish
          --mode=dry-run"

      - name: Upload npm dry-run tarballs
        uses: actions/upload-artifact@v7
        with:
          name: npm-dry-run-tarballs
          path: temp/release/npm

  crates-package:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint-and-typecheck
      - rust-tests
      - ts-tests
      - e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: crates-publish-rust-${{ github.job }}
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Package Rust crates
        run: mise exec --command "node scripts/release-cli.ts crates publish
          --mode=package --report=temp/release/crates/package-report.json"

      - name: Upload crates package report
        uses: actions/upload-artifact@v7
        with:
          name: crates-package-report
          path: temp/release/crates
