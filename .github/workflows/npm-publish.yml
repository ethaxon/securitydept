name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - publish

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    if: inputs.mode == 'dry-run'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Pack and publish dry-run npm packages
        run: mise exec --command "node scripts/release-cli.ts npm publish
          --mode=dry-run"

      - name: Upload npm dry-run tarballs
        uses: actions/upload-artifact@v7
        with:
          name: npm-dry-run-tarballs
          path: temp/release/npm

  publish:
    if: inputs.mode == 'publish'
    runs-on: ubuntu-latest
    environment:
      name: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Publish npm packages
        run: mise exec --command "node scripts/release-cli.ts npm publish
          --mode=publish --provenance"
