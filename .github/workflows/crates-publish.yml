name: Crates Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        type: choice
        required: true
        default: package
        options:
          - package
          - publish

permissions:
  contents: read

concurrency:
  group: crates-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    if: inputs.mode == 'package'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: crates-publish-rust-${{ github.job }}
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Package Rust crates
        run: mise exec --command "node scripts/release-cli.ts crates publish
          --mode=package
          --report=temp/release/crates/package-report.json"

      - name: Upload crates package report
        uses: actions/upload-artifact@v7
        with:
          name: crates-package-report
          path: temp/release/crates

  publish:
    if: inputs.mode == 'publish'
    runs-on: ubuntu-latest
    environment:
      name: crates-io-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install toolchain
        run: mise install

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-${{
            hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ github.workflow }}-
            pnpm-store-${{ runner.os }}-

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: crates-publish-rust-${{ github.job }}
          cache-workspace-crates: "true"
          cache-on-failure: "true"

      - name: Install dependencies
        run: mise exec --command "pnpm install --frozen-lockfile"

      - name: Exchange GitHub OIDC token for crates.io publish token
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: mise exec --command "node scripts/release-cli.ts crates publish
          --mode=publish --report=temp/release/crates/publish-report.json"
