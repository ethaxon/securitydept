name: Docs

on:
    push:
        branches:
            - main
        paths:
            - "README.md"
            - "README_zh.md"
            - "LICENSE"
            - "LICENSE.md"
            - "docs/**"
            - "docsite/**"
            - "mise.toml"
            - "justfile"
            - ".github/workflows/docs.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: docs-pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup mise
              uses: ./.github/actions/setup-mise-pnpm
              with:
                  working-directory: docsite
                  lockfile: docsite/pnpm-lock.yaml
                  cache-mode: read-write

            - name: Configure Pages
              uses: actions/configure-pages@v6

            - name: Build VitePress site
              run: mise exec -C docsite --command "pnpm run build"

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: docsite/.vitepress/dist

            - name: Write docs workflow report
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p temp/release/docs
                  cat > temp/release/docs/report.json <<EOF
                  {
                    "schemaVersion": 1,
                    "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                    "sourceRef": "${GITHUB_REF}",
                    "sourceSha": "${GITHUB_SHA}",
                    "artifact": "docsite/.vitepress/dist"
                  }
                  EOF

            - name: Upload docs workflow report
              uses: actions/upload-artifact@v7
              with:
                  name: docs-workflow-report
                  path: temp/release/docs/report.json

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
