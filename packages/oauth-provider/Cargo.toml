[package]
name = "securitydept-oauth-provider"
version = "0.2.0-beta.2"
edition = "2024"

authors = ["Zhou Yeheng <root@aitiotekt.com>"]
description = "OAuth Provider of SecurityDept, a layered authentication and authorization toolkit built as reusable Rust crates."
license = "MIT"
repository = "https://github.com/ethaxon/securitydept"
homepage = "https://securitydept.ethaxon.com/"
documentation = "https://docs.rs/securitydept-oauth-provider"
readme = "README.md"
keywords = ["auth","oauth","oidc","security","token"]
categories = ["authentication","network-programming","web-programming"]
[dependencies]
securitydept-utils = { version = "~0.2.0-beta.2", path = "../utils" }
openidconnect = { workspace = true }
oauth2 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
snafu = { workspace = true }
humantime-serde = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
