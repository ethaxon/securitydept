[package]
name = "securitydept-core"
version = "0.2.0-alpha.2"
edition = "2024"

[features]
default = []
utils = ["dep:securitydept-utils"]
reexport-oauth2 = ["dep:oauth2"]
reexport-openidconnect = ["dep:openidconnect", "reexport-oauth2"]
oauth-provider = ["dep:securitydept-oauth-provider", "reexport-openidconnect"]
oidc-client = ["dep:securitydept-oidc-client", "reexport-openidconnect"]
oidc-client-axum = ["oidc-client", "securitydept-oidc-client/axum"]
oidc-client-claims-script = [
    "oidc-client",
    "securitydept-oidc-client/claims-script",
]
oidc-client-default-pending-store = [
    "oidc-client",
    "oidc-client-moka-pending-store",
    "securitydept-oidc-client/default-pending-store",
]
oidc-client-moka-pending-store = [
    "oidc-client",
    "securitydept-oidc-client/moka-pending-store",
]
oauth-resource-server = [
    "dep:securitydept-oauth-resource-server",
    "reexport-openidconnect",
]
oauth-resource-server-jwe = [
    "oauth-resource-server",
    "securitydept-oauth-resource-server/jwe",
]
basic-auth-zone = ["dep:securitydept-basic-auth-zone", "creds"]
session-context = ["dep:securitydept-session-context"]
realip = ["dep:securitydept-realip"]
creds = ["dep:securitydept-creds"]
creds-jwk = ["creds", "securitydept-creds/jwk"]
creds-jwt = ["creds", "creds-jwk", "securitydept-creds/jwt", "dep:jsonwebtoken"]
# jwe requires openssl, so we don't enable it by default for more pure dependencies
creds-jwe = [
    "creds",
    "creds-jwk",
    "creds-jwt",
    "securitydept-creds/jwe",
    "dep:josekit",
]
creds-rfc9068 = [
    "creds",
    "creds-jwk",
    "creds-jwt",
    "securitydept-creds/rfc9068",
]
creds-oidc = ["creds", "securitydept-creds/oidc", "reexport-openidconnect"]
creds-manage = ["dep:securitydept-creds-manage"]
creds-manage-migration = ["creds-manage", "securitydept-creds-manage/migration"]

[dependencies]
securitydept-utils = { path = "../utils", optional = true }
securitydept-oauth-provider = { path = "../oauth-provider", optional = true }
securitydept-oidc-client = { path = "../oidc-client", optional = true }
securitydept-oauth-resource-server = { path = "../oauth-resource-server", optional = true }
securitydept-basic-auth-zone = { path = "../basic-auth-zone", optional = true }
securitydept-session-context = { path = "../session-context", optional = true }
securitydept-realip = { path = "../realip", optional = true }
securitydept-creds = { path = "../creds", optional = true }
securitydept-creds-manage = { path = "../creds-manage", optional = true }
openidconnect = { workspace = true, optional = true }
oauth2 = { workspace = true, optional = true }
jsonwebtoken = { workspace = true, optional = true }
josekit = { workspace = true, optional = true }
