[package]
name = "securitydept-auth-runtime"
version = "0.2.0-alpha.3"
edition = "2024"

[features]
full = ["basic-auth-context", "session-context", "token-set-context"]
basic-auth-context = [
  "dep:securitydept-basic-auth-context",
  "dep:securitydept-creds",
  "dep:securitydept-realip",
]
session-context = [
  "dep:securitydept-oidc-client",
  "dep:securitydept-session-context",
  "dep:tower-sessions",
]
token-set-context = [
  "dep:securitydept-creds",
  "dep:securitydept-oauth-resource-server",
  "dep:securitydept-oidc-client",
  "dep:securitydept-token-set-context",
]

[dependencies]
chrono = { workspace = true }
http = { workspace = true }
securitydept-basic-auth-context = { path = "../basic-auth-context", optional = true }
securitydept-creds = { path = "../creds", optional = true }
securitydept-oidc-client = { path = "../oidc-client", optional = true }
securitydept-oauth-resource-server = { path = "../oauth-resource-server", optional = true }
securitydept-realip = { path = "../realip", optional = true }
securitydept-session-context = { path = "../session-context", optional = true }
securitydept-token-set-context = { path = "../token-set-context", optional = true }
securitydept-utils = { path = "../utils" }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tower-sessions = { workspace = true, optional = true }
tracing = { workspace = true }
url = { workspace = true }
