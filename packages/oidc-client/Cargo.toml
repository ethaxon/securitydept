[package]
name = "securitydept-oidc-client"
version = "0.2.0-alpha.2"
edition = "2024"

[features]
default = ["claims-script", "default-pending-store"]
claims-script = ["dep:boa_engine", "dep:swc_core"]
default-pending-store = ["moka-pending-store"]
moka-pending-store = ["dep:moka"]

[dependencies]
securitydept-oauth-provider = { path = "../oauth-provider" }
securitydept-utils = { path = "../utils" }
openidconnect = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros", "rt", "sync", "time"] }
tracing = { workspace = true }
url = { workspace = true }
serde_with = { workspace = true }
http = { workspace = true }
base64 = { workspace = true }
boa_engine = { version = "0.21", optional = true }
chrono = { workspace = true }
swc_core = { version = "58", features = [
    "__parser",
    "common",
    "ecma_ast",
    "ecma_codegen",
    "ecma_parser_typescript",
    "ecma_transforms",
    "ecma_transforms_typescript",
    "ecma_visit",
], optional = true }
serde-constant = { workspace = true }
humantime-serde = { workspace = true }
moka = { workspace = true, features = ["future"], optional = true }
