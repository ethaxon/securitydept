[package]
name = "securitydept-token-set-context"
version = "0.2.0-alpha.3"
edition = "2024"

[features]
recommend = [
    "recommend-pending-store",
    "axum-reverse-proxy-propagation-forwarder",
]
recommend-pending-store = ["moka-pending-store"]
moka-pending-store = ["dep:moka"]
recommend-propagation-forwarder = ["axum-reverse-proxy-propagation-forwarder"]
axum-reverse-proxy-propagation-forwarder = [
    "dep:axum",
    "dep:axum-reverse-proxy",
]

[dependencies]
securitydept-oauth-provider = { path = "../oauth-provider" }
securitydept-oidc-client = { path = "../oidc-client" }
securitydept-oauth-resource-server = { path = "../oauth-resource-server" }
securitydept-utils = { path = "../utils" }
base64 = { workspace = true }
chrono = { workspace = true }
humantime-serde = { workspace = true }
http = { workspace = true }
moka = { workspace = true, features = ["future", "sync"], optional = true }
orion = "0.17"
regex = { workspace = true }
serde = { workspace = true }
serde_regex = { version = "1" }
serde_json = { workspace = true }
snafu = { workspace = true }
typed-builder = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }
axum = { workspace = true, optional = true }
axum-reverse-proxy = { version = "1", optional = true }
