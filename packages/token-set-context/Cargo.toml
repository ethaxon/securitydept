[package]
name = "securitydept-token-set-context"
version = "0.2.0-beta.1"
edition = "2024"

authors = ["Zhou Yeheng <root@aitiotekt.com>"]
description = "Token Set Context of SecurityDept, a layered authentication and authorization toolkit built as reusable Rust crates."
license = "MIT"
repository = "https://github.com/ethaxon/securitydept"
homepage = "https://securitydept.ethaxon.com/"
documentation = "https://docs.rs/securitydept-token-set-context"
readme = "README.md"
keywords = ["auth","oauth","oidc","security","token"]
[features]
recommend = ["recommend-pending-store", "recommend-propagation-forwarder"]
recommend-pending-store = ["moka-pending-store"]
moka-pending-store = ["dep:moka"]
recommend-propagation-forwarder = ["axum-reverse-proxy-propagation-forwarder"]
axum-reverse-proxy-propagation-forwarder = [
    "dep:axum",
    "dep:axum-reverse-proxy",
]

[dependencies]
securitydept-oauth-provider = { version = "=0.2.0-beta.1", path = "../oauth-provider" }
securitydept-oidc-client = { version = "=0.2.0-beta.1", path = "../oidc-client" }
securitydept-oauth-resource-server = { version = "=0.2.0-beta.1", path = "../oauth-resource-server" }
securitydept-creds = { version = "=0.2.0-beta.1", path = "../creds" }
securitydept-utils = { version = "=0.2.0-beta.1", path = "../utils" }
base64 = { workspace = true }
chrono = { workspace = true }
humantime-serde = { workspace = true }
http = { workspace = true }
moka = { workspace = true, features = ["future", "sync"], optional = true }
openidconnect = { workspace = true }
orion = "0.17"
regex = { workspace = true }
serde = { workspace = true }
serde_regex = { version = "1" }
serde_json = { workspace = true }
serde_with = { workspace = true }
snafu = { workspace = true }
tracing = { workspace = true }
typed-builder = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true, features = ["fs", "sync"] }
axum = { workspace = true, optional = true }
axum-reverse-proxy = { version = "1", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net"] }
rustls = { workspace = true }
axum = { workspace = true, features = ["tokio"] }
