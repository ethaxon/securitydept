[package]
name = "securitydept-oidc"
version = "0.1.1"
edition = "2024"

[features]
default = ["claims-script", "default-pending-store"]
claims-script = ["dep:boa_engine", "dep:swc_core"]
default-pending-store = ["moka-pending-store"]
moka-pending-store = ["dep:moka"]
axum = ["dep:axum"]

[dependencies]
securitydept-utils = { path = "../utils" }
openidconnect = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
tracing = { workspace = true }
url = { workspace = true }
serde_with = { workspace = true }
http = { workspace = true }
axum = { workspace = true, optional = true }
boa_engine = { version = "0.21", optional = true }
swc_core = { version = "58", features = [
    "__parser",
    "common",
    "ecma_ast",
    "ecma_codegen",
    "ecma_parser_typescript",
    "ecma_transforms",
    "ecma_transforms_typescript",
    "ecma_visit",
], optional = true }
serde-constant = "0.1"
moka = { version = "0.12", features = ["future"], optional = true }
orion = "0.17"
