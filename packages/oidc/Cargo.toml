[package]
name = "securitydept-oidc"
version = "0.1.1"
edition = "2024"

[features]
default = ["claims-script"]
claims-script = ["boa_engine", "swc_core"]

[dependencies]
openidconnect = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
http = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
serde_with = { workspace = true }
boa_engine = { version = "0.21", optional = true }
swc_core = { version = "57", features = [
    "__parser",
    "common",
    "ecma_ast",
    "ecma_codegen",
    "ecma_parser_typescript",
    "ecma_transforms",
    "ecma_transforms_typescript",
    "ecma_visit",
], optional = true }
