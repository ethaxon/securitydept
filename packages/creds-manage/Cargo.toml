[package]
name = "securitydept-creds-manage"
version = "0.2.0-beta.4"
edition = "2024"

authors = ["Zhou Yeheng <root@aitiotekt.com>"]
description = "Credentials Management of SecurityDept, a layered authentication and authorization toolkit built as reusable Rust crates."
license = "MIT"
repository = "https://github.com/ethaxon/securitydept"
homepage = "https://securitydept.ethaxon.com/"
documentation = "https://docs.rs/securitydept-creds-manage"
readme = "README.md"
keywords = ["auth","oauth","oidc","security","token"]
categories = ["authentication","network-programming","web-programming"]
[features]
migration = []

[dependencies]
securitydept-utils = { version = "~0.2.0-beta.4", path = "../utils" }
securitydept-creds = { version = "~0.2.0-beta.4", path = "../creds" }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["fs", "sync", "rt"] }
tracing = { workspace = true }
openidconnect = { workspace = true }
http = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
fs2 = { workspace = true }
arc-swap = { workspace = true }
atomic-write-file = { workspace = true }
notify = { workspace = true }
notify-debouncer-full = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
