[package]
name = "securitydept-creds"
version = "0.2.0"
edition = "2024"

authors = ["Zhou Yeheng <root@aitiotekt.com>"]
description = "Credentials of SecurityDept, a layered authentication and authorization toolkit built as reusable Rust crates."
license = "MIT"
repository = "https://github.com/ethaxon/securitydept"
homepage = "https://securitydept.ethaxon.com/"
documentation = "https://docs.rs/securitydept-creds"
readme = "README.md"
keywords = ["auth","oauth","oidc","security","token"]
categories = ["authentication","network-programming","web-programming"]
[features]
jwk = []
oidc = ["dep:openidconnect"]
jwt = ["dep:jsonwebtoken", "jwk"]
jwe = ["jwt", "dep:josekit", "jwk"]
# jwe requires openssl, so we don't enable it by default for more pure dependencies
rfc9068 = ["jwt", "jwk"]

[dependencies]
securitydept-utils = { version = "~0.2.0", path = "../utils" }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
tracing = { workspace = true }
base64 = { workspace = true }
http = { workspace = true }
argon2 = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
serde_with = { workspace = true }
jsonwebtoken = { workspace = true, optional = true }
josekit = { workspace = true, optional = true }
openidconnect = { workspace = true, optional = true }
