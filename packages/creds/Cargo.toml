[package]
name = "securitydept-creds"
version = "0.1.1"
edition = "2024"

[features]
zone = ["dep:typed-builder", "dep:web-route"]
axum = ["dep:axum"]

[dependencies]
securitydept-utils = { path = "../utils" }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
tracing = { workspace = true }
base64 = { workspace = true }
http = { workspace = true }
web-route = { workspace = true, optional = true }
axum = { workspace = true, optional = true }
typed-builder = { workspace = true, optional = true }
argon2 = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
