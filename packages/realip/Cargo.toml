[package]
name = "securitydept-realip"
version = "0.2.0-beta.4"
edition = "2024"
authors = ["Zhou Yeheng <root@aitiotekt.com>"]
description = "Real IP of SecurityDept, a layered authentication and authorization toolkit built as reusable Rust crates."
license = "MIT"
repository = "https://github.com/ethaxon/securitydept"
homepage = "https://securitydept.ethaxon.com/"
documentation = "https://docs.rs/securitydept-realip"
readme = "README.md"
keywords = ["auth","oauth","oidc","security","token"]
categories = ["authentication","network-programming","web-programming"]
[features]
docker = ["dep:bollard"]
kube = ["dep:k8s-openapi", "dep:kube"]
kube-integration-test = ["kube"]

[dependencies]
arc-swap = { workspace = true }
bollard = { workspace = true, default-features = false, features = [
    "ssl",
    "pipe",
], optional = true }
http = { workspace = true }
ipnet = { workspace = true }
k8s-openapi = { version = "0.27", features = ["v1_31"], optional = true }
kube = { version = "3", default-features = false, features = [
    "client",
    "rustls-tls",
], optional = true }
notify = { workspace = true }
reqwest = { workspace = true }
rfc7239 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["fs", "process", "rt", "sync", "time"] }
tracing = { workspace = true }
humantime-serde = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
rustls = { workspace = true, features = ["ring"] }
testcontainers = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[[test]]
name = "integration"
path = "tests/integration/main.rs"
required-features = ["docker"]

[[test]]
name = "e2e"
path = "tests/e2e/main.rs"
required-features = ["kube-integration-test"]
