[package]
name = "securitydept-realip"
version = "0.2.0-alpha.2"
edition = "2024"

[dependencies]
arc-swap = { workspace = true }
bollard = { version = "0.18", default-features = false, features = ["ssl", "pipe"] }
http = { workspace = true }
ipnet = { workspace = true }
k8s-openapi = { version = "0.24", features = ["v1_30"] }
kube = { version = "0.98", default-features = false, features = ["client", "rustls-tls"] }
notify = { workspace = true }
reqwest = { workspace = true }
rfc7239 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["fs", "process", "rt", "sync", "time"] }
tracing = { workspace = true }
humantime-serde = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
